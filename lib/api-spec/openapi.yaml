openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: orders
    description: Order operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error

  /products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      required: [id, name, category, price, imageUrl, description, rating, createdAt]
      properties:
        id:          { type: integer }
        name:        { type: string }
        category:    { type: string }
        price:       { type: integer }
        imageUrl:    { type: string }
        description: { type: string }
        rating:      { type: number }
        createdAt:   { type: string }

    ProductInput:
      type: object
      required: [name, category, price, imageUrl]
      properties:
        name:        { type: string, minLength: 1 }
        category:    { type: string, minLength: 1 }
        price:       { type: integer, minimum: 0 }
        imageUrl:    { type: string, minLength: 1 }
        description: { type: string }
        rating:      { type: number }

    DeleteResult:
      type: object
      required: [success]
      properties:
        success: { type: boolean }

    OrderItem:
      type: object
      required: [id, name, price, quantity, image]
      properties:
        id:       { type: string }
        name:     { type: string }
        price:    { type: integer }
        quantity: { type: integer }
        image:    { type: string }

    Order:
      type: object
      required: [id, customerName, customerPhone, deliveryAddress, totalPrice, items, createdAt]
      properties:
        id:              { type: integer }
        customerName:    { type: string }
        customerPhone:   { type: string }
        deliveryAddress: { type: string }
        totalPrice:      { type: integer }
        items:           { type: array, items: { $ref: "#/components/schemas/OrderItem" } }
        createdAt:       { type: string }

    OrderInput:
      type: object
      required: [customerPhone, deliveryAddress, totalPrice, items]
      properties:
        customerName:    { type: string }
        customerPhone:   { type: string, minLength: 1 }
        deliveryAddress: { type: string, minLength: 1 }
        totalPrice:      { type: integer, minimum: 0 }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
