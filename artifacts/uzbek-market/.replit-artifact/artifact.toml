kind = "web"
previewPath = "/"
title = "Uzbek Market"
version = "1.0.0"
id = "artifacts/uzbek-market"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22830

[services.development]
run = "pnpm --filter @workspace/uzbek-market run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uzbek-market", "run", "build" ]
publicDir = "artifacts/uzbek-market/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22830"
BASE_PATH = "/"
